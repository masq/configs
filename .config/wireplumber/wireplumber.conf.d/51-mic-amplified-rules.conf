# File: ~/.config/wireplumber/main.lua.d/51-mic-amplified-rules.lua

monitor.alsa.rules = [{
	matches = [{
		node.name = "headset-mic-amplified"
	}]
	actions = {
		update-props = {
			node.nick = "Amplified Mic Input"
			media.role = "mic"
			# Important: Force the output ports to be managed or ignored
			node.passive = true
			node.link.auto = false
		}
	}
}]

