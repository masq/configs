# ~/.config/wireplumber/wireplumber.conf.d/99-headset-mic-amplify.conf
#
# Author: Spencer Walden (@masq)
# Date: 2025-09-24
# Description: Headset Mic Amplification Pipewire Chain Filter


context.modules = [{
	"name": "libpipewire-module-filter-chain",
	"args": {
		"node.name": "headset-mic-amplified",
		"node.description": "Headset Mic (Amplified)",
		"media.class": "Audio/Source",
		"audio.channels": 1, 
		"audio.position": "MONO", 
		#"audio.channels": 2,  # Assuming stereo mic, adjust if mono
		#"audio.position": "FL,FR",  # Adjust if mono ("MONO")

		"node.passive": true,
		"node.link.auto": false,

		"capture.props": {
			"node.description": "Headset Mic (Amplified Capture)",
			"media.role": "filter",

			# Specify the exact source to capture from.
			# pw-cli list-objects | grep "USB"
			#"target.object": "alsa_input.usb-Generic_USB_Audio-00.HiFi__Mic1__source",
			"target.object": "alsa_input.usb-Generic_USB_Audio-00.HiFi__Mic__source",

			# New property to prevent WirePlumber from falling back to other sources
			# if the targeted one is unavailable.
			"node.dont-fallback": true,
			"node.passive": true,

			# New property to allow WirePlumber to clean up the connections.
			#"node.link.group": "mic-filter-group"
		},

		"playback.props": {
			"media.class": "Audio/Source",
			"stream.dont-remix": true,
			"node.passive": true,
			"node.link.auto": false
		},

		"filter.graph": {
			"nodes": [{
				"type": "builtin",
				"name": "mic-convolver",
				"label": "convolver",
				"config": {
					# The 'gain' value for convolver applies to the entire IR.
					# It is a linear gain factor.
					# 40 dB is a linear gain of 10^(40/20) = 10^2 = 100.0
					# Gain = 10^(dB/20)
					"gain": 50.0,
					"filename": "/dirac",
					"length": 512  # A reasonable length for the Dirac impulse
				}
			}]
		}
	}
}]
